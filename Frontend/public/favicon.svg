<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <style>
    .bg { fill: #1E1E1E; }
    .border { stroke: #C8A96A; stroke-width: 2; fill: none; }
    .text { 
      fill: #C8A96A; 
      font-size: 42px; 
      font-family: Georgia, serif; 
      font-weight: bold;
      text-anchor: middle;
      dominant-baseline: middle;
      transition: all 0.3s ease;
    }
    svg:hover .text {
      fill: #FFD700;
      transform: scale(1.05);
    }
  </style>

  <!-- Background -->
  <rect class="bg" width="120" height="120" rx="20"></rect>

  <!-- Border -->
  <rect class="border" x="3" y="3" width="114" height="114" rx="18"></rect>

  <!-- SP Text -->
  <text x="50%" y="52%" class="text">SP</text>
</svg>